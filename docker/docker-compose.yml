# ===================================================================
# Samba Platform – Infrastructure Docker (développement)
# ===================================================================
#
# Services            | Port hôte  | URL
# ——————————————————— | ————————— | ——————————————————————————————
# PostgreSQL          | 5432       | jdbc:postgresql://localhost:5432
# pgAdmin             | 5050       | http://localhost:5050
# MinIO API           | 9000       | http://localhost:9000
# MinIO Console       | 9001       | http://localhost:9001
# Keycloak            | 8180       | http://localhost:8180
# Dozzle (logs)       | 8888       | http://localhost:8888
# Backend API         | 8080       | http://localhost:8080/api# Prometheus          | 9090       | http://localhost:9090
# Grafana             | 3001       | http://localhost:3001#
# Démarrage : cd docker && docker compose up -d
# Backend seul : cd docker && docker compose up -d backend
# ===================================================================

services:

  # ─────────────────────────────────────────────────────────────────
  # PostgreSQL 17 – Serveur unique, 3 bases de données
  #   • db-samba       → application backend
  #   • db-keycloak   → Keycloak IAM
  #   • db-minio      → notifications/événements MinIO
  # ─────────────────────────────────────────────────────────────────
  postgres:
    image: postgres:17-alpine
    container_name: samba-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init-db.sh:/docker-entrypoint-initdb.d/init-db.sh:ro
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    networks:
      - samba-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ─────────────────────────────────────────────────────────────────
  # pgAdmin 4 – Interface web PostgreSQL
  #   Connexions pré-configurées : db-samba | db-keycloak | db-minio
  #   Mode Desktop (SERVER_MODE=False) → pas d'écran de connexion
  # ─────────────────────────────────────────────────────────────────
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: samba-pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD}
      PGADMIN_CONFIG_SERVER_MODE: "False"
      PGADMIN_CONFIG_MASTER_PASSWORD_REQUIRED: "False"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
      - ./pgadmin/servers.json:/pgadmin4/servers.json:ro
    ports:
      - "${PGADMIN_PORT:-5050}:80"
    networks:
      - samba-net
    depends_on:
      postgres:
        condition: service_healthy

  # ─────────────────────────────────────────────────────────────────
  # MinIO – Object Storage S3-compatible
  #   Buckets : users-avatars, agencies-logos, properties-media
  #             property-documents, tenant-documents,
  #             documents-generated, ticket-attachments
  # ─────────────────────────────────────────────────────────────────
  minio:
    image: minio/minio:latest
    container_name: samba-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - minio_data:/data
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    networks:
      - samba-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
      start_period: 10s

  # ─────────────────────────────────────────────────────────────────
  # MinIO Init – Création des buckets au premier démarrage
  #   Exécution unique (restart: "no") – s'arrête après init
  # ─────────────────────────────────────────────────────────────────
  minio-init:
    image: minio/mc:latest
    container_name: samba-minio-init
    restart: "no"
    depends_on:
      minio:
        condition: service_healthy
    entrypoint:
      - /bin/sh
      - -c
      - |
        mc alias set samba http://minio:9000 ${MINIO_ROOT_USER} ${MINIO_ROOT_PASSWORD}

        # Créer les buckets
        mc mb --ignore-existing samba/users-avatars
  
        echo "Buckets MinIO initialises avec succes"
    networks:
      - samba-net

  # ─────────────────────────────────────────────────────────────────
  # Keycloak 26 – IAM / OAuth2 / OIDC
  #   Mode : start-dev (HTTP, sans HTTPS requis)
  #   Base de données : db-keycloak (PostgreSQL)
  #   ⚠️  start-dev est réservé au développement uniquement
  # ─────────────────────────────────────────────────────────────────
  keycloak:
    image: quay.io/keycloak/keycloak:26.1.5
    container_name: samba-keycloak
    restart: unless-stopped
    command: start-dev
    environment:
      # Base de données
      KC_DB: postgres
      KC_DB_URL_HOST: postgres
      KC_DB_URL_DATABASE: ${KEYCLOAK_DB_NAME}
      KC_DB_USERNAME: ${POSTGRES_USER}
      KC_DB_PASSWORD: ${POSTGRES_PASSWORD}
      # Compte administrateur bootstrap (Keycloak 26+)
      KC_BOOTSTRAP_ADMIN_USERNAME: ${KEYCLOAK_ADMIN_USER}
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD}
      # Réseau & sécurité
      KC_HTTP_PORT: 8080
      KC_HOSTNAME_STRICT: "false"
      KC_PROXY_HEADERS: xforwarded
      # Observabilité
      KC_HEALTH_ENABLED: "true"
      KC_METRICS_ENABLED: "true"
      KC_LOG_LEVEL: info
    ports:
      - "${KEYCLOAK_PORT:-8180}:8080"
    networks:
      - samba-net
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/localhost/8080 && echo ok >&3 && exec 3>&-"]
      interval: 15s
      timeout: 5s
      retries: 15
      start_period: 60s

  # ─────────────────────────────────────────────────────────────────
  # Backend Spring Boot – SAMBA Platform API
  #   Profil : full-stack (n'est PAS démarré par défaut)
  #   Usage  : docker compose --profile full-stack up -d
  #   Accès  : http://localhost:8080/api
  #   Swagger: http://localhost:8080/api/swagger-ui.html
  #
  #   ℹ️  En développement, lancer le backend depuis l'IDE (plus rapide,
  #       hot-reload, debug possible). Ce service est utile pour CI/CD
  #       ou pour partager l'env complet avec un collègue.
  # ─────────────────────────────────────────────────────────────────
  backend:
    profiles:
      - full-stack
    build:
      context: ..              # Racine du projet (où se trouve le Dockerfile)
      dockerfile: Dockerfile
    image: samba-platform:latest
    pull_policy: build         # Toujours construire localement, ne jamais télécharger
    container_name: samba-backend
    restart: unless-stopped
    environment:
      # Base de données
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${POSTGRES_DB}
      DB_USERNAME: ${POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      # Keycloak
      KEYCLOAK_URL: http://keycloak:8080
      KEYCLOAK_REALM: ${KEYCLOAK_REALM}
      KEYCLOAK_CLIENT_ID: ${KEYCLOAK_CLIENT_ID}
      KEYCLOAK_CLIENT_SECRET: ${KEYCLOAK_CLIENT_SECRET}
      KEYCLOAK_ISSUER_URI: http://keycloak:8080/realms/${KEYCLOAK_REALM}
      # MinIO
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
      # Spring
      SERVER_SERVLET_CONTEXT_PATH: /api
      SPRING_PROFILES_ACTIVE: docker
      ADMIN_EMAIL: ${ADMIN_EMAIL}
      # ── Bootstrap Super Admin (premier démarrage uniquement) ──────
      BOOTSTRAP_ENABLED: ${BOOTSTRAP_ENABLED:-false}
      BOOTSTRAP_SUPER_ADMIN_EMAIL: ${BOOTSTRAP_SUPER_ADMIN_EMAIL:-superadmin@samba.io}
      BOOTSTRAP_SUPER_ADMIN_FIRST_NAME: ${BOOTSTRAP_SUPER_ADMIN_FIRST_NAME:-Super}
      BOOTSTRAP_SUPER_ADMIN_LAST_NAME: ${BOOTSTRAP_SUPER_ADMIN_LAST_NAME:-Admin}
      BOOTSTRAP_SUPER_ADMIN_PHONE: ${BOOTSTRAP_SUPER_ADMIN_PHONE:-+22600000000}
    ports:
      - "${BACKEND_PORT:-8080}:8080"
    networks:
      - samba-net
    depends_on:
      postgres:
        condition: service_healthy
      keycloak:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/api/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # ─────────────────────────────────────────────────────────────────
  # Prometheus – Collecte des métriques (profil monitoring)
  #   Accès : http://localhost:9090
  # ─────────────────────────────────────────────────────────────────
  prometheus:
    profiles:
      - monitoring
    image: prom/prometheus:latest
    container_name: samba-prometheus
    restart: unless-stopped
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.retention.time=7d'
    ports:
      - "9090:9090"
    networks:
      - samba-net

  # ─────────────────────────────────────────────────────────────────
  # Grafana – Dashboards de monitoring (profil monitoring)
  #   Accès : http://localhost:3001   login : admin / admin
  # ─────────────────────────────────────────────────────────────────
  grafana:
    profiles:
      - monitoring
    image: grafana/grafana:latest
    container_name: samba-grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    ports:
      - "3001:3000"
    networks:
      - samba-net
    depends_on:
      - prometheus

  # ─────────────────────────────────────────────────────────────────
  # Dozzle – Visualisation des logs de tous les conteneurs en temps réel
  #   Accès : http://localhost:8888
  # ─────────────────────────────────────────────────────────────────
  dozzle:
    image: amir20/dozzle:latest
    container_name: samba-dozzle
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    ports:
      - "${DOZZLE_PORT:-8888}:8080"
    environment:
      DOZZLE_LEVEL: info
      DOZZLE_TAILSIZE: 300
    networks:
      - samba-net

# ─── Volumes persistants ─────────────────────────────────────────
volumes:
  postgres_data:
    driver: local
    name: samba_postgres_data
  pgadmin_data:
    driver: local
    name: samba_pgadmin_data
  minio_data:
    driver: local
    name: samba_minio_data
  prometheus_data:
    driver: local
    name: samba_prometheus_data
  grafana_data:
    driver: local
    name: samba_grafana_data

# ─── Réseau interne ──────────────────────────────────────────────
networks:
  samba-net:
    driver: bridge
    name: samba-net
