# ===================================================================
# UBAX Platform – CI : Compile → Test → Build → Push Docker Hub
# ===================================================================
#
# Branches :
#   develop → image :develop
#   main    → image :latest + :main + :sha-{short}
#
# Secrets requis :
#   DOCKER_HUB_USERNAME  · DOCKER_HUB_TOKEN
# ===================================================================

name: CI – Build & Push

on:
  push:
    branches:
      - main
      - develop
    paths-ignore:
      - '**.md'
      - 'docker/grafana/**'
      - 'docker/pgadmin/**'
      - '.gitignore'

jobs:

  # ═══════════════════════════════════════════════════════════════
  # STAGE 0 – Google Java Format Check
  # ═══════════════════════════════════════════════════════════════
  format-check:
    name: 📝 Stage 0 – Google Java Format
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Check Google Java Format
        run: |
          chmod +x mvnw
          ./mvnw fmt:check -B --no-transfer-progress

  # ═══════════════════════════════════════════════════════════════
  # STAGE 1 – Compile & Test
  # ═══════════════════════════════════════════════════════════════
  test:
    name: 🧪 Stage 1 – Compile & Test
    runs-on: ubuntu-latest
    needs: format-check

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Compile & run unit tests
        run: |
          chmod +x mvnw
          ./mvnw test -B --no-transfer-progress

  # ═══════════════════════════════════════════════════════════════
  # STAGE 2 – Build & Push Docker Hub
  # ═══════════════════════════════════════════════════════════════
  build-push:
    name: 🐳 Stage 2 – Build & Push
    runs-on: ubuntu-latest
    needs: test

    permissions:
      contents: read

    outputs:
      image-tag: ${{ steps.tag.outputs.value }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Package (skip tests – déjà exécutés)
        run: |
          chmod +x mvnw
          ./mvnw package -DskipTests -B --no-transfer-progress

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      - name: Resolve image tag
        id: tag
        run: |
          if [ "${{ github.ref }}" = "refs/heads/main" ]; then
            echo "value=latest" >> $GITHUB_OUTPUT
          else
            echo "value=develop" >> $GITHUB_OUTPUT
          fi

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ubaxproject/ubax-hub
          tags: |
            type=ref,event=branch
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=sha,prefix=sha-,format=short,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/amd64,linux/arm64
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ═══════════════════════════════════════════════════════════════
  # STAGE 3 – Deploy to VPS
  # ═══════════════════════════════════════════════════════════════
  deploy:
    name: 🚀 Stage 3 – Deploy to VPS
    runs-on: ubuntu-latest
    needs: build-push

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Sync docker config files to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_PRIVATE_KEY }}
          use_insecure_cipher: true
          source: >-
            docker/docker-compose.vps.yml,
            docker/docker-compose.jenkins.yml,
            docker/prometheus/prometheus.vps.yml,
            docker/grafana/,
            docker/nginx/nginx.conf,
            docker/postgres/init-db.sh,
            docker/pgadmin/servers.json,
            docker/jenkins/setup-jenkins.sh
          target: /opt/ubax/
          strip_components: 1
          overwrite: true

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_PRIVATE_KEY }}
          timeout: 180s
          use_insecure_cipher: true
          script: |
            set -e
            cd /opt/ubax

            mkdir -p prometheus grafana/provisioning/datasources nginx postgres pgadmin
            mkdir -p /opt/jenkins/data
            chown -R 1000:1000 /opt/jenkins

            TAG="${{ needs.build-push.outputs.image-tag }}"
            echo "==> Déploiement tag : $TAG"

            sed -i "s/^BACKEND_TAG=.*/BACKEND_TAG=$TAG/" .env

            echo "${{ secrets.DOCKER_HUB_TOKEN }}" | \
              docker login -u "${{ secrets.DOCKER_HUB_USERNAME }}" --password-stdin

            # Pull nouvelle image backend (retry x3 en cas d'erreur réseau)
            pulled=false
            for attempt in 1 2 3; do
              echo "==> Pull tentative $attempt/3"
              if docker compose -f docker-compose.vps.yml pull backend; then
                pulled=true
                break
              fi
              [ $attempt -lt 3 ] && echo "Pull échoué, nouvel essai dans 15s..." && sleep 15
            done
            $pulled || { echo "❌ Pull échoué après 3 tentatives"; exit 1; }

            # ── Restart uniquement le backend (Keycloak déjà healthy en prod) ──
            docker compose -f docker-compose.vps.yml up -d --no-deps --remove-orphans backend

            # ── Attendre que le backend soit healthy ───────────────────────────
            echo "==> Attente démarrage backend..."
            for i in $(seq 1 20); do
              STATUS=$(docker inspect --format='{{.State.Health.Status}}' ubax-backend-prod 2>/dev/null || echo "unknown")
              echo "Attempt $i/20 – status: $STATUS"
              [ "$STATUS" = "healthy" ] && break
              [ $i -eq 20 ] && { echo "❌ Backend non healthy après 200s"; exit 1; }
              sleep 10
            done

            docker exec ubax-nginx-prod nginx -s reload || true

            if ! docker ps --format '{{.Names}}' | grep -q '^ubax-jenkins$'; then
              docker compose -f docker-compose.jenkins.yml up -d
            else
              docker compose -f docker-compose.jenkins.yml up -d --no-recreate
            fi

            docker image prune -f
            echo "==> Déploiement terminé ✓"

  # ═══════════════════════════════════════════════════════════════
  # STAGE 4 – Health Check post-déploiement
  # ═══════════════════════════════════════════════════════════════
  health-check:
    name: 🏥 Stage 4 – Health Check
    runs-on: ubuntu-latest
    needs: deploy

    steps:
      - name: Wait & retry until backend is healthy
        run: |
          echo "Waiting for backend to become healthy (max 2 min)..."
          for i in $(seq 1 12); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
              http://${{ secrets.VPS_HOST }}/api/actuator/health)
            echo "Attempt $i/12 – HTTP $STATUS"
            if [ "$STATUS" = "200" ]; then
              echo "✅ Backend healthy"
              exit 0
            fi
            sleep 10
          done
          echo "❌ Health check failed after 2 minutes"
          exit 1

      - name: Print health details
        if: always()
        run: |
          curl -sf http://${{ secrets.VPS_HOST }}/api/actuator/health | \
            python3 -m json.tool || true
