# ===================================================================
# UBAX Platform – CI branches de développement
# ===================================================================
#
# Déclenché sur : feature/*, hotfix/*, bugfix/*
# Stages        : Format → Compile & Test
# ❌ Pas de build Docker Hub
# ❌ Pas de déploiement VPS
# ❌ Pas de Jenkins
#
# But : vérifier la qualité du code avant la PR (fail fast)
# ===================================================================

name: CI – Branch Check

on:
  push:
    branches:
      - 'feature/**'
      - 'hotfix/**'
      - 'bugfix/**'
    paths-ignore:
      - '**.md'
      - 'docker/grafana/**'
      - 'docker/pgadmin/**'
      - '.gitignore'
  pull_request:
    branches:
      - main
      - develop
    paths-ignore:
      - '**.md'
      - 'docker/grafana/**'
      - 'docker/pgadmin/**'
      - '.gitignore'

jobs:

  # ═══════════════════════════════════════════════════════════════
  # STAGE 0 – Google Java Format Check
  # ═══════════════════════════════════════════════════════════════
  format-check:
    name: 📝 Stage 0 – Google Java Format
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Check Google Java Format
        run: |
          chmod +x mvnw
          ./mvnw fmt:check -B --no-transfer-progress

      - name: Hint en cas d'échec
        if: failure()
        run: |
          echo "❌ Format non conforme. Corrigez localement avec :"
          echo "   ./mvnw fmt:apply"

  # ═══════════════════════════════════════════════════════════════
  # STAGE 1 – Compile & Tests unitaires
  # ═══════════════════════════════════════════════════════════════
  test:
    name: 🧪 Stage 1 – Compile & Test
    runs-on: ubuntu-latest
    needs: format-check

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Compile & run unit tests
        run: |
          chmod +x mvnw
          ./mvnw test -B --no-transfer-progress

      - name: Publier les rapports de tests
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ github.run_id }}
          path: '**/target/surefire-reports/*.xml'
          if-no-files-found: ignore
          retention-days: 7