spring:
  application:
    name: samba-platform

  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}

  # ─── Multipart (upload fichiers) ─────────────────────────────────
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

  # ─── PostgreSQL ──────────────────────────────────────────────────
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5433}/${DB_NAME:db-gestion-stock}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:gestionstock123}

  jpa:
    hibernate:
      ddl-auto: none
      naming:
        physical-strategy: org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        default_schema: administrative
        jdbc:
          lob:
            non_contextual_creation: true
    show-sql: false

  flyway:
    enabled: true
    default-schema: administrative
    schemas: administrative
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 0
    out-of-order: false

  # ─── Keycloak OAuth2 Resource Server ─────────────────────────────
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${KEYCLOAK_ISSUER_URI:http://localhost:8180/realms/samba-plateform}
          jwk-set-uri: ${KEYCLOAK_ISSUER_URI:http://localhost:8180/realms/samba-plateform}/protocol/openid-connect/certs

  # ─── JavaMail – SMTP ─────────────────────────────────────────────
  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:no-reply@ubax.io}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
        debug: false

  # ─── Thymeleaf ───────────────────────────────────────────────────
  thymeleaf:
    prefix: classpath:/templates/
    suffix: .html
    mode: HTML
    encoding: UTF-8
    cache: false

# ─── Server ──────────────────────────────────────────────────────
server:
  port: ${SERVER_PORT:9090}
  servlet:
    context-path: ${SERVER_SERVLET_CONTEXT_PATH:/api}
  max-http-request-header-size: 126KB
  forward-headers-strategy: framework

# ─── Keycloak Client ─────────────────────────────────────────────
keycloak:
  realm: ${KEYCLOAK_REALM:samba-plateform}
  auth-server-url: ${KEYCLOAK_URL:http://localhost:8180}
  client-id: ${KEYCLOAK_CLIENT_ID}
  client-secret: ${KEYCLOAK_CLIENT_SECRET}
  issuer-uri: ${keycloak.auth-server-url}/realms/${keycloak.realm}

# ─── MinIO (Object Storage) ──────────────────────────────────────
minio:
  endpoint: ${MINIO_ENDPOINT:http://localhost:9000}
  access-key: ${MINIO_ACCESS_KEY:minioadmin}
  secret-key: ${MINIO_SECRET_KEY:minioadmin123}
  buckets:
    - users-avatars
    - boutiques-logos
    - products-photos

# ─── Swagger / OpenAPI ───────────────────────────────────────────
springdoc:
  swagger-ui:
    path: ${SPRINGDOC_SWAGGER_UI_PATH:/swagger-ui.html}
    oauth:
      client-id: ${keycloak.client-id}
      realm: ${keycloak.realm}
  api-docs:
    path: ${SPRINGDOC_API_DOCS_PATH:/api-docs}

# ─── Actuator / Monitoring ───────────────────────────────────────
management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      show-details: when-authorized

# ─── Samba Application ───────────────────────────────────────────
samba:
  security:
    enabled: ${SECURITY_ENABLED:true}
  endpoints:
    frontend: ${FRONTEND_URL:http://localhost:3000}
  mail:
    from: ${MAIL_FROM:no-reply@ubax.io}
    admin-email: ${ADMIN_EMAIL:mba@ubax.io}
    from-name: ${MAIL_FROM_NAME:SAMBA Platform}
  bootstrap:
    enabled: ${BOOTSTRAP_ENABLED:true}
    email: ${BOOTSTRAP_SUPER_ADMIN_EMAIL:mba@ubax.io}
    first-name: ${BOOTSTRAP_SUPER_ADMIN_FIRST_NAME:Super}
    last-name: ${BOOTSTRAP_SUPER_ADMIN_LAST_NAME:Admin}
    phone: ${BOOTSTRAP_SUPER_ADMIN_PHONE:+221783703310}

# ─── SMS – LAfricaMobile ─────────────────────────────────────────
lam:
  sms:
    api-url: ${LAM_SMS_URL:https://lamsms.lafricamobile.com/api}
    account-id: ${LAM_ACCOUNT_ID:}
    password: ${LAM_PASSWORD:}
    sender: ${LAM_SENDER:UBAX}